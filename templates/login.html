{% extends "base.html" %}

{% block login_content %}
<div class="card border-0 shadow-lg" style="width: 400px; border-radius: 16px;">
    <div class="card-body p-5">
        <div class="text-center mb-5">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-3 mb-3" style="width: 48px; height: 48px;">
                <i class="bi bi-box-seam-fill fs-4"></i>
            </div>
            <h4 class="fw-bold text-dark">ANCLAJES Y PERNOS SAC</h4>
            <p class="text-muted small">Inicie sesión en el portal corporativo</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">USUARIO</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" name="username" class="form-control bg-light border-start-0 py-2" placeholder="Ej: admin" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">CONTRASEÑA</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-start-0 py-2" placeholder="••••••••" required>
                </div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary py-2 fw-bold">
                    ACCEDER AL SISTEMA
                </button>
            </div>
        </form>
    </div>
    <div class="card-footer bg-light text-center py-3 border-0 rounded-bottom-4">
        <small class="text-muted">© 2026 ANCLAJES Y PERNOS S.A.C.</small>
    </div>
</div>
{% endblock %}
